<!DOCTYPE html>
<html>
<head>
    <title>water-control</title>
    <style>
        /* Center the h1 element */
        h1 {
            text-align: center;
            font-family: "Arial", sans-serif;
            color: #009688;
            margin-bottom: 20px;
        }

        /* Set the content column width to 500px */
        .content-column {
            width: 310px;
            margin: 0 auto; /* Center the column horizontally */
        }

        /* CSS for arranging labels and inputs in a table-like layout */
        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
            justify-content: space-between;
            margin-bottom: 10px;
        }

        /* Right-align the labels */
        .input-row .label-column {
            text-align: right;
            flex-basis: 150px; /* Set a fixed width for the left column */
            color: #333;
        }

        /* Left-align the input fields */
        .input-row .input-column {
            flex: 1; /* Allow the input field to take remaining space */
            flex-basis: 150px;
        }

        /* Apply the "Roboto" font to the whole page */
        body {
            font-family: "Roboto", sans-serif;
            background-color: #f0f0f0;
            margin: 0;
            padding: 20px;
        }

        /* Style the input fields */
        input[type="number"],
        input[type="time"] {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 5px;
            font-size: 16px;
        }

        /* Style the buttons */
        button {
            padding: 10px 20px;
            background-color: #009688;
            color: #fff;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            transition: background-color 0.3s;
        }

        button:hover {
            background-color: #00796b;
        }

        /* Style the form */
        form {
            border: 1px solid #ddd;
            border-radius: 5px;
            padding: 20px;
            background-color: #fff;
        }
    </style>
</head>
<body>
    <h1>water-control</h1>
    <!-- Removed the first line of text -->
    
    <!-- Content column -->
    <div class="content-column">
        <!-- Wrap all the input elements in a form -->
        <form>
            <!-- Period in days -->
            <div class="input-row">
                <div class="label-column">
                    <label for="period">Period in days:</label>
                </div>
                <div class="input-column">
                    <!-- Use input type "number" with size attribute -->
                    <input type="number" id="period" name="period" min="0" max="7" step="1" size="2">
                </div>
            </div>

            <!-- Start time -->
            <div class="input-row">
                <div class="label-column">
                    <label for="start-time">Start time:</label>
                </div>
                <div class="input-column">
                    <!-- Set the time input to 24-hour format -->
                    <input type="time" id="start-time" name="start-time" inputmode="time" step="3600">
                </div>
            </div>

            <!-- Duration in minutes -->
            <div class="input-row">
                <div class="label-column">
                    <label for="duration">Duration in minutes:</label>
                </div>
                <div class="input-column">
                    <input type="number" id="duration" name="duration" min="0" max="99" size="3">
                </div>
            </div>

            <!-- New input row with Reset and Submit buttons -->
            <div class="input-row">
                <div class="label-column">
                    <!-- Move the Reset button to the label-column -->
                    <button type="reset">Reset</button>
                </div>
                <div class="input-column">
                    <button type="submit">Submit</button>
                </div>
            </div>
        </form>
    </div>
</body>
</html>
